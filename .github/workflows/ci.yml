name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            ocaml-compiler: 5.3.0
          - os: ubuntu-24.04
            ocaml-compiler: 5.3.0

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install system dependencies
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install blake3
          else
            git clone --depth 1 https://github.com/BLAKE3-team/BLAKE3.git /tmp/blake3
            cd /tmp/blake3/c
            gcc -O2 -shared -fPIC -o libblake3.so \
              blake3.c blake3_dispatch.c blake3_portable.c \
              blake3_sse2_x86-64_unix.S blake3_sse41_x86-64_unix.S \
              blake3_avx2_x86-64_unix.S blake3_avx512_x86-64_unix.S
            sudo cp libblake3.so /usr/local/lib/libblake3.so
            sudo cp blake3.h /usr/local/include/blake3.h
            sudo ldconfig
          fi

      - name: Build March compiler
        run: |
          export OPAMSWITCH=${{ github.workspace }}
          eval $(opam env)
          git clone --depth 1 https://github.com/march-language/march.git /tmp/march
          cd /tmp/march
          opam install --deps-only -y .
          dune build bin/main.exe forge/bin/main.exe
          ln -s $(pwd)/_build/default/bin/main.exe $(pwd)/_build/default/bin/march
          ln -s $(pwd)/_build/default/forge/bin/main.exe $(pwd)/_build/default/forge/bin/forge
          echo "$(pwd)/_build/default/bin" >> $GITHUB_PATH
          echo "$(pwd)/_build/default/forge/bin" >> $GITHUB_PATH

      - name: Run tests
        run: |
          export OPAMSWITCH=${{ github.workspace }}
          eval $(opam env)
          export MARCH_STDLIB=/tmp/march/stdlib
          forge test --coverage
